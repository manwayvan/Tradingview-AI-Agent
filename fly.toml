# Fly.io — https://fly.io/docs/reference/configuration/
app = "options-ai-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.web"

[env]
  OPTIONS_DATA_DIR = "/data"
  OPTIONS_COOKIE_SECURE = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[mounts]
  source = "options_data"
  destination = "/data"
