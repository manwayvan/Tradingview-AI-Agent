[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Attach a volume in the Railway dashboard:
#   Mount path: /data
# Then set OPTIONS_DATA_DIR=/data in service variables.
