<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Options AI Agent</title>
    <meta
      http-equiv="refresh"
      content="0; url=https://moneymaker9000-production.up.railway.app/"
    />
    <link
      rel="canonical"
      href="https://moneymaker9000-production.up.railway.app/"
    />
    <style>
      :root {
        --bg: #0f1410;
        --fg: #e8f0e9;
        --muted: #9aaf9e;
        --accent: #6fbf73;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(ellipse at 20% 0%, #1a2a1c 0%, transparent 50%),
          radial-gradient(ellipse at 80% 100%, #152018 0%, transparent 45%),
          var(--bg);
        color: var(--fg);
        padding: 2rem;
      }
      main {
        max-width: 32rem;
        text-align: center;
      }
      h1 {
        font-family: "IBM Plex Serif", Georgia, serif;
        font-weight: 600;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        margin: 0 0 0.75rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      a {
        display: inline-block;
        color: var(--bg);
        background: var(--accent);
        text-decoration: none;
        font-weight: 600;
        padding: 0.85rem 1.25rem;
        border-radius: 0.35rem;
      }
      a:hover {
        filter: brightness(1.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Options AI Agent</h1>
      <p>
        The live app runs on Railway (long-running Python + SQLite), not on
        Netlify. Continue to the production site:
      </p>
      <a href="https://moneymaker9000-production.up.railway.app/">Open app</a>
    </main>
    <script>
      location.replace("https://moneymaker9000-production.up.railway.app/");
    </script>
  </body>
</html>
